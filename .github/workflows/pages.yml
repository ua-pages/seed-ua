name: CI

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'src/**'
      - 'test/**'
      - 'bin/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Run tests
        run: node --test

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload demo
        uses: actions/upload-pages-artifact@v5
        with:
          path: demo
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
